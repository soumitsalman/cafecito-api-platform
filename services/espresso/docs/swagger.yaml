definitions:
  router.ErrorResponse:
    properties:
      error:
        example: 'invalid id: not-a-uuid'
        type: string
    type: object
  router.Event:
    properties:
      actions:
        example:
        - 2026-06-28 Firefighters died and injuries occurred at Wyoming-Utah border.
        - 2026-06-28 Large wildfire destroyed parts of ski resorts.
        items:
          type: string
        type: array
      briefing:
        example: On June 28, 2026, three U.S. firefighters died while battling rapidly
          spreading wildfires near the Colorado-Utah border; approximately 100 sq
          km burned. Temperatures reached 34°C with strong winds, prompting mass evacuations.
          The Snyder Fire merged with others, causing significant damage to infrastructure
          like ski resorts. Causes include severe drought and human factors. This
          incident reflects escalating regional wildfire risks driven by climate change.
        type: string
      companies:
        example:
        - us_federal
        - us_state
        items:
          type: string
        type: array
      cross_domain_impacts:
        example:
        - 'public_safety: Increased risk of civilian casualties.'
        - 'tourism: Disruption of winter sports facilities.'
        - 'environmental: Habitat loss in mountainous areas.'
        items:
          type: string
        type: array
      event_type:
        example: wildfire_outbreak
        type: string
      future_outlook:
        example: Continued extreme fire seasons expected without mitigation efforts.
        type: string
      id:
        example: 091726f8-421a-566d-9db8-339625f2ed9e
        format: uuid
        type: string
      impact_level:
        enum:
        - low
        - medium
        - high
        example: high
        type: string
      macro_context:
        example: western_us_climate_crisis
        type: string
      people:
        example:
        - firefighter_john_doe
        - governor_polis
        items:
          type: string
        type: array
      products:
        example:
        - petróleo
        items:
          type: string
        type: array
      regions:
        example:
        - colorado
        - utah
        items:
          type: string
        type: array
      reported:
        example: "2026-06-28T22:49:07Z"
        type: string
      site_name:
        example: Example News
        type: string
      tags:
        example:
        - wildfire
        - climate_change
        - us
        - emergency_response
        items:
          type: string
        type: array
    type: object
  router.Signal:
    properties:
      briefing:
        example: On 2026-06-02, U.S. lawmakers and the Trump administration debated
          AI sovereign-wealth and compute-tax proposals amid soaring inflation...
        type: string
      drivers:
        example:
        - High inflation and rising consumer costs driven by supply-chain bottlenecks
          and geopolitical tensions.
        items:
          type: string
        type: array
      events:
        example:
        - '2026-06-01: Senator Bernie Sanders introduced a 50% ownership tax on major
          AI firms'
        items:
          type: string
        type: array
      forecast:
        example: 'Short-term: Market volatility will persist, AI regulatory scrutiny
          will intensify, and consumer confidence remains low.'
        type: string
      id:
        example: e7d7571a-13f0-56f0-8563-50863b79c781
        format: uuid
        type: string
      impact_level:
        enum:
        - low
        - medium
        - high
        example: high
        type: string
      impacted_domains:
        example:
        - finance
        - technology
        - cybersecurity
        - labor
        - healthcare
        - energy
        - policy
        items:
          type: string
        type: array
      impacts:
        example:
        - 9.3% market sell-off across tech and financial sectors.
        - Decline in consumer confidence and increased credit-card delinquency.
        items:
          type: string
        type: array
      reported:
        example: "2026-06-02T14:02:00-04:00"
        type: string
      tags:
        example:
        - ai_sovereign_wealth_fund
        - ai_taxation
        - compute_tax
        - inflation
        - market_volatility
        items:
          type: string
        type: array
    type: object
info:
  contact:
    email: soumitsrah@cafecito.tech
    name: Project Cafecito
    url: http://cafecito.tech
  description: |-
    Espresso is a curated business intelligence product suite. Espresso API & MCP provides access to the underlying data store.
    A **sip** is the basic unit of information: action (micro data such as market performance for a day), event (a self-contained set of micro actions and actions), and signal (larger derived intelligence from related events and actions).
    All sip identifiers are UUIDs (RFC 4122), for example `339366bc-464d-582f-8132-6875ccc814d2`. Pass them as strings in query parameters and path segments.
    List endpoints accept an optional `response_type` query parameter: `json` (default) or `text`. Both return the same underlying data; `text` renders it as flat plain text without JSON syntax, which reduces token cost for MCPs and AI agents.
  license:
    name: MIT
  title: Espresso API & MCP
  version: "0.1"
paths:
  /events:
    get:
      description: |-
        Returns event-kind sips sorted by `created` descending (newest first).
        With `response_type=text`, each event is rendered as a flat plain-text digest (field-per-line) instead of a JSON object — same data, fewer tokens for MCPs and AI agents.
      operationId: searchEvents
      parameters:
      - collectionFormat: csv
        description: fetch specific event sips by UUID (RFC 4122), e.g. 339366bc-464d-582f-8132-6875ccc814d2
        in: query
        items:
          type: string
        name: ids
        type: array
      - collectionFormat: csv
        description: scalar tag filters (inclusive AND across supplied tags)
        in: query
        items:
          type: string
        name: tags
        type: array
      - description: semantic search query (max 1024 characters; requires embedder)
        in: query
        maxLength: 1024
        name: q
        type: string
      - default: 0.75
        description: minimum embedding similarity for `q` (0.0-1.0, higher = stricter)
        in: query
        maximum: 1
        minimum: 0
        name: acc
        type: number
      - description: include events created on or after this date (YYYY-MM-DD)
        format: date
        in: query
        name: from
        type: string
      - default: json
        description: 'output format: json (default) returns a JSON array of flattened
          digests; text returns the same data as flat plain text without JSON syntax
          (lower token cost for MCPs and AI agents)'
        enum:
        - json
        - text
        in: query
        name: response_type
        type: string
      - default: 16
        description: page size
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      - text/plain
      responses:
        "200":
          description: plain-text event digests (one record per block) when response_type=text
          schema:
            type: string
        "204":
          description: no matching events
        "400":
          description: invalid query parameters or malformed UUID in ids
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "401":
          description: missing or invalid API key
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "429":
          description: rate limit exceeded
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "500":
          description: database or embedder error
          schema:
            $ref: '#/definitions/router.ErrorResponse'
      summary: Search events
      tags:
      - Events
  /related/{relationship}:
    get:
      description: |-
        Returns sips linked to the supplied UUIDs through the requested relationship.
        With `response_type=text`, each related sip is rendered as a flat plain-text digest (field-per-line) instead of a JSON object — same data, fewer tokens for MCPs and AI agents.
      operationId: getRelatedSips
      parameters:
      - description: relationship to traverse
        enum:
        - same_as
        - derived_from
        in: path
        name: relationship
        required: true
        type: string
      - collectionFormat: csv
        description: source sip UUIDs (RFC 4122), e.g. b07049b5-54c0-50b0-a620-d3aea3f8a173
        in: query
        items:
          type: string
        name: ids
        required: true
        type: array
      - default: json
        description: 'output format: json (default) returns a JSON array of flattened
          digests; text returns the same data as flat plain text without JSON syntax
          (lower token cost for MCPs and AI agents)'
        enum:
        - json
        - text
        in: query
        name: response_type
        type: string
      - default: 16
        description: page size
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      - text/plain
      responses:
        "200":
          description: plain-text related-sip digests (one record per block) when
            response_type=text
          schema:
            type: string
        "204":
          description: no related sips found
        "400":
          description: missing ids, invalid relationship, or malformed UUID
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "401":
          description: missing or invalid API key
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "429":
          description: rate limit exceeded
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "500":
          description: database error
          schema:
            $ref: '#/definitions/router.ErrorResponse'
      summary: Get related sips by relationship
      tags:
      - Related
  /signals:
    get:
      description: |-
        Returns signal-kind sips sorted by `created` descending (newest first).
        With `response_type=text`, each signal is rendered as a flat plain-text digest (field-per-line) instead of a JSON object — same data, fewer tokens for MCPs and AI agents.
      operationId: searchSignals
      parameters:
      - collectionFormat: csv
        description: fetch specific signal sips by UUID (RFC 4122), e.g. e7d7571a-13f0-56f0-8563-50863b79c781
        in: query
        items:
          type: string
        name: ids
        type: array
      - collectionFormat: csv
        description: scalar tag filters (inclusive AND across supplied tags)
        in: query
        items:
          type: string
        name: tags
        type: array
      - description: semantic search query (max 1024 characters; requires embedder)
        in: query
        maxLength: 1024
        name: q
        type: string
      - default: 0.75
        description: minimum embedding similarity for `q` (0.0-1.0, higher = stricter)
        in: query
        maximum: 1
        minimum: 0
        name: acc
        type: number
      - description: include signals created on or after this date (YYYY-MM-DD)
        format: date
        in: query
        name: from
        type: string
      - default: json
        description: 'output format: json (default) returns a JSON array of flattened
          digests; text returns the same data as flat plain text without JSON syntax
          (lower token cost for MCPs and AI agents)'
        enum:
        - json
        - text
        in: query
        name: response_type
        type: string
      - default: 16
        description: page size
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      - text/plain
      responses:
        "200":
          description: plain-text signal digests (one record per block) when response_type=text
          schema:
            type: string
        "204":
          description: no matching signals
        "400":
          description: invalid query parameters or malformed UUID in ids
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "401":
          description: missing or invalid API key
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "429":
          description: rate limit exceeded
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "500":
          description: database or embedder error
          schema:
            $ref: '#/definitions/router.ErrorResponse'
      summary: Search signals
      tags:
      - Signals
  /tags:
    get:
      description: |-
        Returns a paginated, alphabetically sorted list of unique tag strings extracted from event and signal sips. Tags can be passed to `/events` and `/signals` for scalar filtering.
        With `response_type=text`, tags are returned as a single comma-separated plain-text string instead of a JSON array.
      operationId: listTags
      parameters:
      - default: json
        description: 'output format: json (default) returns a JSON string array; text
          returns the same tags as comma-separated plain text (lower token cost for
          MCPs and AI agents)'
        enum:
        - json
        - text
        in: query
        name: response_type
        type: string
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      - text/plain
      responses:
        "200":
          description: comma-separated tags when response_type=text
          schema:
            type: string
        "204":
          description: no matching tags
        "400":
          description: invalid pagination parameters
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "401":
          description: missing or invalid API key
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "429":
          description: rate limit exceeded
          schema:
            $ref: '#/definitions/router.ErrorResponse'
        "500":
          description: database error
          schema:
            $ref: '#/definitions/router.ErrorResponse'
      summary: List tags for filtering events and signals
      tags:
      - Tags
schemes:
- https
swagger: "2.0"
