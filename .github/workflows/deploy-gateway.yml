name: Gateway CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "apis/**"
  pull_request:
    paths-ignore:
      - "apis/**"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run lint
