# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy Espresso API
on:
  push:
    branches: [dev]
    # Deploy only when the Espresso image or this workflow/configuration changes.
    # The image is built from apis/ and the shared Dockerfile/assets, while
    # Beans-only source changes do not affect the Espresso deployment.
    paths:
      - "apis/espresso/**"
      - "apis/internal/**"
      - "apis/go.mod"
      - "apis/go.sum"
      - "apis/Dockerfile"
      - "apis/.dockerignore"
      - "apis/entrypoint.sh"
      - "apis/llama-cpp/**"
      - "apis/fly.espresso.toml"
      - ".github/workflows/fly-deploy-espresso.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Espresso api
    runs-on: ubuntu-latest
    concurrency: deploy-espresso
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy ./apis --config ./fly.espresso.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.ESPRESSO_FLY_API_TOKEN }}
