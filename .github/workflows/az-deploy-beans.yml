name: Trigger auto deployment for cafecito-beans-api

on:
  push:
    # Intentionally disabled: change this back to main to re-enable auto-deploys.
    branches: [__disabled__]
    paths:
      - "apis/beans/**"
      - "apis/internal/**"
      - "apis/go.mod"
      - "apis/go.sum"
      - "apis/Dockerfile"
      - "apis/.dockerignore"
      - "apis/entrypoint.sh"
      - "apis/fly.beans.toml"
      - ".github/workflows/az-deploy-beans.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAFECITOBEANSAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAFECITOBEANSAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAFECITOBEANSAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Render containerapp YAML
        run: |
          mkdir -p .github/containerapp
          cat > .github/containerapp/beans.rendered.yaml <<EOF
          properties:
            template:
              containers:
                - name: main
                  image: docker.io/soumitsr/beans-api:${GITHUB_SHA}
                  resources:
                    cpu: 0.5
                    memory: 1Gi
                  env:
                  - name: PG_CONNECTION_STRING
                    secretRef: pg-connection-string
                  - name: API_KEYS
                    secretRef: api-keys
                  - name: MAX_CONCURRENT_REQUESTS
                    value: '512'
                  - name: EMBEDDER_BASE_URL
                    value: localhost:10000
                - name: embedder
                  image: docker.io/soumitsr/tei-static:latest
                  resources:
                    cpu: 0.5
                    memory: 1Gi
          EOF

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/apis
          dockerfilePath: beans/Dockerfile
          registryUrl: docker.io
          registryUsername: ${{ secrets.CAFECITOBEANSAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAFECITOBEANSAPI_REGISTRY_PASSWORD }}
          containerAppName: cafecito-beans-api
          resourceGroup: frontends-rg
          imageToBuild: soumitsr/beans-api:${{ github.sha }}
          yamlConfigPath: .github/containerapp/beans.rendered.yaml
          _buildArgumentsKey_: |
            _buildArgumentsValues_
